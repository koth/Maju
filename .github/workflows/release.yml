name: Release Desktop

on:
  workflow_dispatch:
  push:
    tags:
      - "app-v*"

permissions:
  contents: write

jobs:
  remote-agent-assets:
    name: Remote agent assets (${{ matrix.asset_suffix }})
    runs-on: ${{ matrix.platform }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - asset_suffix: linux-x64
            platform: ubuntu-24.04
            container: debian:10
            rust_target: x86_64-unknown-linux-gnu
            max_glibc_minor: "28"
          - asset_suffix: linux-arm64
            platform: ubuntu-24.04-arm
            container: ubuntu:24.04
            rust_target: aarch64-unknown-linux-gnu
            max_glibc_minor: ""
    container: ${{ matrix.container }}

    steps:
      - name: Install checkout and build dependencies
        shell: bash
        run: |
          set -euo pipefail
          export DEBIAN_FRONTEND=noninteractive
          if [ -f /etc/os-release ] && grep -q '^VERSION_CODENAME=buster$' /etc/os-release; then
            sed -i 's|deb.debian.org/debian|archive.debian.org/debian|g; s|security.debian.org/debian-security|archive.debian.org/debian-security|g' /etc/apt/sources.list
            printf 'Acquire::Check-Valid-Until "false";\n' > /etc/apt/apt.conf.d/99archive
          fi
          apt-get update
          apt-get install -y --no-install-recommends \
            build-essential \
            ca-certificates \
            curl \
            file \
            git \
            libssl-dev \
            perl \
            pkg-config \
            python3 \
            xz-utils

      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm
          cache-dependency-path: kodex-claude/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Cache Rust
        uses: swatinem/rust-cache@v2
        with:
          workspaces: codex-acp -> codex-acp/target

      - name: Install Claude agent dependencies
        run: npm ci --prefix kodex-claude

      - name: Build codex-acp
        env:
          OPENSSL_NO_VENDOR: "0"
          OPENSSL_STATIC: "1"
        run: |
          cargo clean --manifest-path codex-acp/Cargo.toml -p openssl -p openssl-sys
          cargo build --manifest-path codex-acp/Cargo.toml --release --target ${{ matrix.rust_target }}

      - name: Build codex-acp Linux sandbox
        run: |
          cargo install codex-linux-sandbox \
            --git https://github.com/openai/codex \
            --tag rust-v0.130.0 \
            --bin codex-linux-sandbox \
            --locked \
            --target ${{ matrix.rust_target }} \
            --root dist/codex-sandbox-${{ matrix.asset_suffix }}

      - name: Build kodex-claude
        env:
          KODEX_CLAUDE_NATIVE_LIBC: glibc
        run: npm --prefix kodex-claude run build:binary

      - name: Verify remote agent glibc floor
        if: ${{ matrix.max_glibc_minor != '' }}
        shell: bash
        run: |
          set -euo pipefail
          max_minor="${{ matrix.max_glibc_minor }}"
          binaries=(
            "codex-acp/target/${{ matrix.rust_target }}/release/codex-acp"
            "dist/codex-sandbox-${{ matrix.asset_suffix }}/bin/codex-linux-sandbox"
            "kodex-claude/bin/claude-agent-acp"
          )
          for binary in "${binaries[@]}"; do
            test -x "${binary}"
            echo "Required GLIBC versions for ${binary}:"
            strings "${binary}" | grep -o 'GLIBC_[0-9][0-9.]*' | sort -Vu || true
            if strings "${binary}" | grep -o 'GLIBC_2\.[0-9][0-9]*' | sed 's/GLIBC_2\.//' | awk -v max="${max_minor}" '$1 > max { found=1 } END { exit found ? 0 : 1 }'; then
              echo "${binary} requires a GLIBC version newer than 2.${max_minor}" >&2
              exit 1
            fi
          done

      - name: Verify codex-acp OpenSSL linkage
        shell: bash
        run: |
          set -euo pipefail
          binary="codex-acp/target/${{ matrix.rust_target }}/release/codex-acp"
          test -x "${binary}"
          echo "Dynamic dependencies for ${binary}:"
          ldd "${binary}" || true
          if ldd "${binary}" 2>/dev/null | grep -E 'libssl|libcrypto'; then
            echo "${binary} must not depend on system OpenSSL; remote hosts may not provide the same libssl ABI." >&2
            exit 1
          fi

      - name: Package remote agent assets
        shell: bash
        run: |
          set -euo pipefail
          suffix="${{ matrix.asset_suffix }}"
          rust_target="${{ matrix.rust_target }}"
          out_dir="dist/remote-agents"

          rm -rf "${out_dir}"
          mkdir -p "${out_dir}/codex-acp/bin" "${out_dir}/kodex-claude/bin" dist

          codex_binary="codex-acp/target/${rust_target}/release/codex-acp"
          claude_binary="kodex-claude/bin/claude-agent-acp"
          test -x "${codex_binary}"
          test -x "${claude_binary}"

          cp "${codex_binary}" "${out_dir}/codex-acp/bin/codex-acp"
          cp "${claude_binary}" "${out_dir}/kodex-claude/bin/claude-agent-acp"
          chmod +x "${out_dir}/codex-acp/bin/codex-acp" "${out_dir}/kodex-claude/bin/claude-agent-acp"

          sandbox_binary="dist/codex-sandbox-${suffix}/bin/codex-linux-sandbox"
          test -x "${sandbox_binary}"
          mkdir -p "${out_dir}/codex-acp/codex-resources"
          cp "${sandbox_binary}" "${out_dir}/codex-acp/codex-resources/bwrap"
          chmod +x "${out_dir}/codex-acp/codex-resources/bwrap"

          tar -C "${out_dir}/codex-acp" -czf "dist/codex-acp-${suffix}.tar.gz" .
          tar -C "${out_dir}/kodex-claude" -czf "dist/kodex-claude-${suffix}.tar.gz" .

          tar -tzf "dist/codex-acp-${suffix}.tar.gz" > "dist/codex-acp-${suffix}.files"
          tar -tzf "dist/kodex-claude-${suffix}.tar.gz" > "dist/kodex-claude-${suffix}.files"
          grep -Fx "./bin/codex-acp" "dist/codex-acp-${suffix}.files"
          grep -Fx "./codex-resources/bwrap" "dist/codex-acp-${suffix}.files"
          grep -Fx "./bin/claude-agent-acp" "dist/kodex-claude-${suffix}.files"

      - name: Upload remote agent artifacts
        uses: actions/upload-artifact@v4
        with:
          name: remote-agent-assets-${{ matrix.asset_suffix }}
          path: |
            dist/codex-acp-${{ matrix.asset_suffix }}.tar.gz
            dist/kodex-claude-${{ matrix.asset_suffix }}.tar.gz
          if-no-files-found: error

  release:
    name: ${{ matrix.name }}
    needs: remote-agent-assets
    runs-on: ${{ matrix.platform }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows x64
            platform: windows-latest
            target: x86_64-pc-windows-msvc
            node_platform: win32
            node_arch: x64
            executable_suffix: .exe
          - name: macOS Intel
            platform: macos-15-intel
            target: x86_64-apple-darwin
            node_platform: darwin
            node_arch: x64
            executable_suffix: ""
          - name: macOS Apple Silicon
            platform: macos-15
            target: aarch64-apple-darwin
            node_platform: darwin
            node_arch: arm64
            executable_suffix: ""

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm
          cache-dependency-path: |
            apps/desktop/ui/package-lock.json
            kodex-claude/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust
        uses: swatinem/rust-cache@v2
        with:
          workspaces: |
            . -> target
            codex-acp -> codex-acp/target

      - name: Install dependencies
        run: |
          npm ci --prefix apps/desktop/ui
          npm ci --prefix kodex-claude

      - name: Verify runner platform
        env:
          KODEX_EXPECTED_PLATFORM: ${{ matrix.node_platform }}
          KODEX_EXPECTED_ARCH: ${{ matrix.node_arch }}
        run: |
          node -e 'const expected = process.env.KODEX_EXPECTED_PLATFORM + "-" + process.env.KODEX_EXPECTED_ARCH; const actual = process.platform + "-" + process.arch; if (actual !== expected) { console.error("Runner architecture mismatch: expected " + expected + ", got " + actual); process.exit(1); } console.log("Runner architecture: " + actual);'

      - name: Build bundled agents
        env:
          KODEX_EXPECTED_PLATFORM: ${{ matrix.node_platform }}
          KODEX_EXPECTED_ARCH: ${{ matrix.node_arch }}
          KODEX_CODEX_ACP_BINARY: ${{ github.workspace }}/codex-acp/target/${{ matrix.target }}/release/codex-acp${{ matrix.executable_suffix }}
        run: |
          npm --prefix apps/desktop/ui run claude:binary
          cargo build --manifest-path codex-acp/Cargo.toml --release --target ${{ matrix.target }}
          npm --prefix apps/desktop/ui run codex:stage

      - name: Build and upload Tauri release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: apps/desktop/src-tauri
          tauriScript: npx --prefix ../ui tauri
          tagName: app-v__VERSION__
          releaseName: Kodex v__VERSION__
          releaseBody: See assets to download and install Kodex.
          releaseDraft: true
          prerelease: false
          args: --ci --target ${{ matrix.target }} --config tauri.release.conf.json
          includeUpdaterJson: true
          updaterJsonPreferNsis: true

  upload-remote-agent-assets:
    name: Upload remote agent assets
    needs:
      - remote-agent-assets
      - release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve release tag
        id: release_meta
        shell: bash
        run: |
          set -euo pipefail
          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            tag="${GITHUB_REF_NAME}"
          else
            version="$(sed -n 's/.*"version": *"\([^"]*\)".*/\1/p' apps/desktop/src-tauri/tauri.conf.json | head -n 1)"
            test -n "${version}"
            tag="app-v${version}"
          fi
          echo "tag=${tag}" >> "${GITHUB_OUTPUT}"

      - name: Download remote agent artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: remote-agent-assets-*
          path: dist/remote-agent-assets
          merge-multiple: true

      - name: Upload remote agent assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_meta.outputs.tag }}
          draft: true
          fail_on_unmatched_files: true
          files: |
            dist/remote-agent-assets/codex-acp-linux-x64.tar.gz
            dist/remote-agent-assets/kodex-claude-linux-x64.tar.gz
            dist/remote-agent-assets/codex-acp-linux-arm64.tar.gz
            dist/remote-agent-assets/kodex-claude-linux-arm64.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
